<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="js/funcoes.js"></script>
</head>

<body>
    <div class="container">
        

    <h1><i id="shop" class="bi bi-shop"></i> Lojinha da Unidade</h1>

        

    <table class="table table-hover">
        <thead> 

            <tr>
                <th>Imagem</th> 
                <th>Produto</th>
                <th>Preço Unitário</th>
                <th>Quantidade</th>
                <th>Total</th>
            </tr>


        </thead>
        <tbody>
            <tr>
                <td>
                    <img src="img/imagem_1.jpeg" alt="Produto 1" width="150">
                </td>
                <td>
                    <div>Celular Top</div>
                    <div><span class="produto-item"></span>Código: 123456</div>
                    <div><span class="produto-item"></span>Cor: Preto</div>
                </td>
                <td id="preco-1">1000</td>
                <td>
                    <span class="badge text-bg-danger" onclick="alterarQtd('1', '-')"><i class="bi bi-dash-lg"></i></span>
                        <span id="qtd_1">0</span>
                        <span class="badge text-bg-success" onclick="alterarQtd('1', '+')"><i class="bi bi-plus"></i></span>
                </td>
                <td id="total_1">0</td>

            </tr>

           <tr>
                <td>
                    <img src="img/imagem_2.jpg" alt="Produto 2" width="200">
                </td>
                <td>
                    <div>Notebook Bacana</div>
                    <div><span class="produto-item"></span>Código: 123456</div>
                    <div><span class="produto-item"></span>Cor: Preto</div>
                </td>
                <td id="preco-2">4000</td>
                <td>
                    <span class="badge text-bg-danger" onclick="alterarQtd('2', '-')"><i class="bi bi-dash-lg"></i></span>
                    <span id="qtd_2">0</span>
                    <span class="badge text-bg-success" onclick="alterarQtd('2', '+')"><i class="bi bi-plus"></i></span>
                </td>
                <td id="total_2">0</td>

            </tr>

            <tr>
                <td>
                    <img src="img/imagem_3.jpg" alt="Produto 3" width="200">
                </td>
                <td>
                    <div>Televisão Boa</div>
                    <div><span class="produto-item"></span>Código: 123456</div>
                    <div><span class="produto-item"></span>Cor: Preto</div>
                </td>
                <td id="preco-3">2000</td>
                <td>
                    <span class="badge text-bg-danger" onclick="alterarQtd('3', '-')"><i class="bi bi-dash-lg"></i></span>
                    <span id="qtd_3">0</span>
                    <span class="badge text-bg-success" onclick="alterarQtd('3', '+')"><i class="bi bi-plus"></i></span>
                </td>
                <td id="total_3">0</td>

            </tr>
        </tbody>
    </table>
    <footer class="text-center">
        <span><i class="bi bi-cart-check"></i> Subtotal: <span id="subtotal"> R$ </span></span>
    </footer>
    </div>
</body>

</html>
